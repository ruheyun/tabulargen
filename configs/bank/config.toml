data_path = "data/bank"
exp_path = "exp/bank"
device = "cuda:0"
seed = 0

[model_params]
d_in = 16
is_y_cond = true
num_classes = 2

[model_params.rtdl_params]
d_layers = [
    512,
    256,
]
dropout = 0.0

[diffusion_params]
num_timesteps = 500
gaussian_loss_type = "mse"
scheduler = "cosine"

[train.main]
epochs = 25
lr = 0.0006982179585993695
weight_decay = 0.0
batch_size = 128

[sample]
num_samples = 9000
batch_size = 256
seed = 4

[eval.type]
eval_model = "catboost"
eval_type = "synthetic"

[dp]
is_dp = true
epsilon = 10
sigma = 0.71258544921875
max_grad_norm = 1.0
delta = 1e-05
noise_multiplicity_K = 3
