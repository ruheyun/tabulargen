data_path = "data/adult"
exp_path = "exp/adult"
device = "cuda:0"
seed = 0

[model_params]
d_in = 34
is_y_cond = true
num_classes = 2

[model_params.rtdl_params]
d_layers = [
    256,
    1024,
    1024,
    256,
]
dropout = 0.0

[diffusion_params]
num_timesteps = 500
gaussian_loss_type = "mse"
scheduler = "cosine"

[train.main]
epochs = 100
lr = 0.0020099410620098234
weight_decay = 0.0
batch_size = 256

[sample]
num_samples = 25642
batch_size = 256
seed = 0

[eval.type]
eval_model = "catboost"
eval_type = "synthetic"

[dp]
is_dp = true
epsilon = 10
delta = 1e-5
sigma = 1.0
max_grad_norm = 1.0
noise_multiplicity_K = 3
